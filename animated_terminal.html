<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entroly Live Engine Demo</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap');
  
  :root {
    --bg: #0a0a1a;
    --surface: #12122a;
    --border: #2a2a4a;
    --text: #e4e4f0;
    --dim: #666688;
    --green: #00ff88;
    --blue: #00ccff;
    --red: #ff4466;
    --orange: #ff8844;
    --purple: #aa66ff;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    margin: 0;
    padding: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .container {
    padding: 40px;
    max-width: 1200px;
    margin: 0 auto;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    position: relative;
    box-sizing: border-box;
  }

  h1 {
    font-size: 2.5rem;
    font-weight: 800;
    margin-bottom: 8px;
    background: linear-gradient(90deg, var(--green), var(--blue));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .subtitle {
    color: var(--dim);
    font-size: 1.1rem;
    margin-bottom: 40px;
    font-family: 'JetBrains Mono', monospace;
  }

  .terminal {
    background: #000;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.95rem;
    flex-grow: 1;
    overflow-y: auto;
    box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    position: relative;
  }

  .line {
    margin-bottom: 8px;
    opacity: 0;
    transform: translateY(10px);
    animation: fadeIn 0.3s forwards;
    display: flex;
    align-items: flex-start;
  }

  @keyframes fadeIn {
    to { opacity: 1; transform: translateY(0); }
  }

  .prefix { color: var(--dim); margin-right: 12px; user-select: none; }
  .user-input { color: var(--green); font-weight: 600; }
  
  .t-green { color: var(--green); }
  .t-blue { color: var(--blue); }
  .t-red { color: var(--red); }
  .t-dim { color: var(--dim); }
  .t-orange { color: var(--orange); }
  .t-purple { color: var(--purple); }
  
  .bg-red { background: rgba(255,68,102,0.15); padding: 2px 6px; border-radius: 4px; color: var(--red); border: 1px solid rgba(255,68,102,0.3); }
  .bg-green { background: rgba(0,255,136,0.15); padding: 2px 6px; border-radius: 4px; color: var(--green); border: 1px solid rgba(0,255,136,0.3); }

  .dashboard {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-top: 24px;
    opacity: 0;
    transform: translateY(20px);
    transition: all 0.5s ease;
  }
  
  .dashboard.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .dash-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    text-align: center;
  }

  .dash-card .value {
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--blue);
    margin: 8px 0;
    font-family: 'JetBrains Mono', monospace;
  }

  .dash-card .label {
    font-size: 0.75rem;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .scan-line {
    position: absolute;
    top: 0; left: 0; right: 0; height: 2px;
    background: rgba(0,255,136,0.5);
    box-shadow: 0 0 10px rgba(0,255,136,0.8);
    opacity: 0;
  }

  @keyframes scan {
    0% { top: 0; opacity: 1; }
    100% { top: 100%; opacity: 0; }
  }

  .progress-bar {
    width: 100px;
    height: 6px;
    background: var(--surface);
    border-radius: 3px;
    display: inline-block;
    margin-left: 12px;
    overflow: hidden;
    vertical-align: middle;
  }

  .progress-fill {
    height: 100%;
    background: var(--blue);
    width: 0%;
    transition: width 0.3s;
  }

  .flex-row { display: flex; justify-content: space-between; width: 400px; }
</style>
</head>
<body>

<div class="container">
  <h1>Entroly Engine (Live Demo)</h1>
  <div class="subtitle">v0.1.0 • Rust MCP Subsystem • Connected: OK</div>
  
  <div class="terminal" id="term">
    <div class="scan-line" id="scan"></div>
  </div>

  <div class="dashboard" id="dashboard">
    <div class="dash-card">
      <div class="label">Optimize Latency</div>
      <div class="value t-blue" id="stat-latency">--</div>
      <div class="label">0/1 Knapsack DP</div>
    </div>
    <div class="dash-card">
      <div class="label">Context Efficiency</div>
      <div class="value t-green" id="stat-eff">--</div>
      <div class="label">Information Bits/Token</div>
    </div>
    <div class="dash-card">
      <div class="label">Duplicates Caught</div>
      <div class="value t-orange" id="stat-dedup">--</div>
      <div class="label">SimHash hamming &le; 3</div>
    </div>
    <div class="dash-card">
      <div class="label">Token Waste</div>
      <div class="value t-green" id="stat-waste">--</div>
      <div class="label">vs 78% baseline</div>
    </div>
  </div>
</div>

<script>
  // Real data captured from Rust engine
  const DATA = {
    ingest: [
      { file: "auth/db.py", tokens: 85, h: 0.8863, t: "126µs", dup: false, status: "ok" },
      { file: "auth/queries.py", tokens: 72, h: 0.9046, t: "171µs", dup: false, status: "ok" },
      { file: "models/user.py", tokens: 50, h: 0.8237, t: "165µs", dup: false, status: "ok" },
      { file: "config/database.py", tokens: 40, h: 0.9109, t: "187µs", dup: false, status: "ok" },
      { file: "README.md", tokens: 120, h: 0.9090, t: "194µs", dup: false, status: "noise" },
      { file: "static/styles.css", tokens: 140, h: 0.9227, t: "270µs", dup: false, status: "noise" },
      { file: "utils/email.py", tokens: 110, h: 0.8426, t: "285µs", dup: false, status: "noise" },
      { file: "CHANGELOG.md", tokens: 95, h: 0.9010, t: "274µs", dup: false, status: "noise" },
      { file: "tests/conftest.py", tokens: 100, h: 0.8187, t: "294µs", dup: false, status: "noise" },
      { file: "utils/validators.py", tokens: 90, h: 0.8662, t: "284µs", dup: false, status: "noise" },
      { file: "views/home.py", tokens: 65, h: 0.8457, t: "307µs", dup: false, status: "noise" },
      { file: "auth/db_backup.py", tokens: 85, h: 0.0000, t: "21µs", dup: true, status: "dup" },
      { file: "deploy/docker-compose.yml", tokens: 90, h: 0.8878, t: "269µs", dup: false, status: "noise" }
    ],
    selected: [
      { file: "auth/db.py", tokens: 85, rel: 0.7273 },
      { file: "models/user.py", tokens: 50, rel: 0.6015 },
      { file: "config/database.py", tokens: 40, rel: 0.5884 },
      { file: "tests/conftest.py", tokens: 100, rel: 0.6083 }
    ],
    latency: "0.26ms",
    eff: "862.29",
    dedup: 1,
    waste: "0%"
  };

  const term = document.getElementById('term');
  
  function addLine(html, delay = 0) {
    return new Promise(resolve => {
      setTimeout(() => {
        const div = document.createElement('div');
        div.className = 'line';
        div.innerHTML = `<span class="prefix">❯</span><span>${html}</span>`;
        term.appendChild(div);
        term.scrollTop = term.scrollHeight;
        resolve(div);
      }, delay);
    });
  }

  function typeText(text, delay = 30) {
    return new Promise(resolve => {
      const div = document.createElement('div');
      div.className = 'line';
      div.innerHTML = `<span class="prefix">❯</span><span class="typing"></span>`;
      term.appendChild(div);
      
      const span = div.querySelector('.typing');
      let i = 0;
      
      const ival = setInterval(() => {
        if(i < text.length) {
          span.textContent += text.charAt(i);
          i++;
          term.scrollTop = term.scrollHeight;
        } else {
          clearInterval(ival);
          resolve(div);
        }
      }, delay);
    });
  }

  async function runDemo() {
    await addLine(`<span class="t-dim">Initializing Entroly Engine...</span>`, 500);
    await addLine(`<span class="t-green">Engine loaded (Rust Core initialized)</span>. Memory block: 0x7fc8a00`, 800);
    await addLine(`<br>`, 200);

    // Prompt
    await addLine(`<span class="t-blue">Waiting for LLM prompt context...</span>`, 500);
    await typeText("PROMPT: \"fix the SQL injection vulnerability in cursor.execute\"", 40);
    await addLine(`<br>`, 200);

    // Ingestion
    await addLine(`<span class="t-dim">Ingesting 13 files from codebase into context window...</span>`, 800);
    
    for(const f of DATA.ingest) {
      const pFill = f.dup ? 0 : Math.round(f.h * 100);
      let statHTML = "";
      
      if(f.dup) {
        statHTML = `<span class="bg-red">DUPLICATE DETECTED</span> <span class="t-dim">(85 tokens saved)</span>`;
      } else {
        statHTML = `<span class="t-green">H=${f.h.toFixed(4)}</span> <span class="t-dim">(${f.tokens} tok)</span> <span class="progress-bar"><div class="progress-fill" style="width:${pFill}%"></div></span>`;
      }
      
      await addLine(`<div class="flex-row"><span>${f.file.padEnd(25, ' ')}</span></div>${statHTML} <span class="t-dim">[${f.t}]</span>`, 150);
    }

    await addLine(`<br>`, 400);

    // Optimization
    const scan = document.getElementById('scan');
    scan.style.animation = 'scan 1.5s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
    await addLine(`<span class="t-orange">Running 0/1 Knapsack DP Optimization... (Budget: 300 tokens)</span>`, 1500);

    await addLine(`<span class="t-green">Optimization complete in ${DATA.latency}</span>`, 500);
    await addLine(`<br>`, 200);

    // Results
    await addLine(`<span class="t-blue">FINAL CONTEXT PAYLOAD (Prepared for LLM)</span>`, 600);
    
    for(const s of DATA.selected) {
      await addLine(`  <span class="t-green">✓ INCLUDED:</span> <span class="t-dim">${s.file.padEnd(25, ' ')}</span> <span class="t-purple">rel: ${s.rel}</span> <span class="t-dim">${s.tokens} tok</span>`, 200);
    }
    
    await addLine(`<br>`, 400);
    await addLine(`<span class="t-dim">Dropped 9 irrelevant files (915 noise tokens filtered).</span>`, 800);
    
    // Show Dashboard
    document.getElementById('dashboard').classList.add('visible');
    
    setTimeout(() => { document.getElementById('stat-latency').textContent = DATA.latency; }, 400);
    setTimeout(() => { document.getElementById('stat-eff').textContent = DATA.eff; }, 800);
    setTimeout(() => { document.getElementById('stat-dedup').textContent = DATA.dedup; }, 1200);
    setTimeout(() => { document.getElementById('stat-waste').textContent = DATA.waste; }, 1600);

    await addLine(`<br>`, 1000);
    await addLine(`<span class="t-green">Ready.</span> <span class="t-dim">Sent 275 high-value tokens to Claude/GPT-4.</span>`, 400);
  }

  // Start
  setTimeout(runDemo, 500);
</script>

</body>
</html>

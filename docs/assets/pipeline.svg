<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520">
  <defs>
    <style>
      .title { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 20px; font-weight: 700; fill: #e2e8f0; }
      .subtitle { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 11px; fill: #94a3b8; }
      .box-label { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 12px; font-weight: 600; fill: #f1f5f9; }
      .box-detail { font-family: 'JetBrains Mono', monospace; font-size: 9.5px; fill: #94a3b8; }
      .box-metric { font-family: 'JetBrains Mono', monospace; font-size: 9px; font-weight: 700; fill: #34d399; }
      .arrow-label { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 9px; fill: #64748b; }
      .stage-label { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 10px; font-weight: 600; fill: #8b5cf6; text-transform: uppercase; letter-spacing: 1px; }
    </style>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="box-ingest" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#172554"/>
    </linearGradient>
    <linearGradient id="box-score" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b1f5e"/>
      <stop offset="100%" stop-color="#2e1065"/>
    </linearGradient>
    <linearGradient id="box-select" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#14532d"/>
      <stop offset="100%" stop-color="#052e16"/>
    </linearGradient>
    <linearGradient id="box-learn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#713f12"/>
      <stop offset="100%" stop-color="#451a03"/>
    </linearGradient>
    <linearGradient id="box-output" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#134e4a"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#475569"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#34d399"/>
    </marker>
    <filter id="boxGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" fill="url(#bg)"/>

  <!-- Grid dots -->
  <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
    <circle cx="10" cy="10" r="0.5" fill="#1e293b"/>
  </pattern>
  <rect width="900" height="520" fill="url(#dots)"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" class="title">How Entroly Optimizes Every AI Request</text>
  <text x="450" y="52" text-anchor="middle" class="subtitle">19 Rust modules · &lt;10ms overhead · <tspan style="opacity:0.6">70-</tspan><tspan style="opacity:1;font-weight:700;fill:#e2e8f0">95%</tspan> token reduction · closed-loop learning</text>

  <!-- ════════ STAGE 1: INGEST ════════ -->
  <text x="100" y="82" text-anchor="middle" class="stage-label">① Ingest</text>

  <!-- Your Codebase -->
  <rect x="20" y="92" width="160" height="70" rx="6" fill="url(#box-ingest)" stroke="#3b82f6" stroke-width="1" opacity="0.9"/>
  <text x="100" y="112" text-anchor="middle" class="box-label">Your Codebase</text>
  <text x="100" y="128" text-anchor="middle" class="box-detail">847 files · git-aware scan</text>
  <text x="100" y="142" text-anchor="middle" class="box-detail">50+ languages · auto-detect</text>
  <text x="100" y="155" text-anchor="middle" class="box-metric">186,420 raw tokens</text>

  <!-- Arrow down -->
  <line x1="100" y1="162" x2="100" y2="182" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- SimHash + Skeleton -->
  <rect x="20" y="185" width="160" height="65" rx="6" fill="url(#box-ingest)" stroke="#3b82f6" stroke-width="1" opacity="0.9"/>
  <text x="100" y="205" text-anchor="middle" class="box-label">SimHash + Skeleton</text>
  <text x="100" y="221" text-anchor="middle" class="box-detail">64-bit fingerprints · O(1)</text>
  <text x="100" y="234" text-anchor="middle" class="box-detail">dedup + code signatures</text>
  <text x="100" y="247" text-anchor="middle" class="box-metric">60-80% body reduction</text>

  <!-- Arrow down -->
  <line x1="100" y1="250" x2="100" y2="270" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Dep Graph -->
  <rect x="20" y="273" width="160" height="60" rx="6" fill="url(#box-ingest)" stroke="#3b82f6" stroke-width="1" opacity="0.9"/>
  <text x="100" y="293" text-anchor="middle" class="box-label">Dependency Graph</text>
  <text x="100" y="309" text-anchor="middle" class="box-detail">imports · calls · type refs</text>
  <text x="100" y="323" text-anchor="middle" class="box-metric">auto-linked context chains</text>

  <!-- ════════ STAGE 2: SCORE ════════ -->
  <text x="310" y="82" text-anchor="middle" class="stage-label">② Score</text>

  <!-- Entropy Scoring -->
  <rect x="220" y="92" width="180" height="72" rx="6" fill="url(#box-score)" stroke="#a855f7" stroke-width="1" opacity="0.9"/>
  <text x="310" y="112" text-anchor="middle" class="box-label">Shannon Entropy</text>
  <text x="310" y="128" text-anchor="middle" class="box-detail">multi-scale n-grams</text>
  <text x="310" y="142" text-anchor="middle" class="box-detail">boilerplate penalty · redundancy</text>
  <text x="310" y="157" text-anchor="middle" class="box-metric">H(x) = -Σ p·log₂(p)</text>

  <!-- Arrow -->
  <line x1="180" y1="127" x2="218" y2="127" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Query Analysis -->
  <rect x="220" y="178" width="180" height="72" rx="6" fill="url(#box-score)" stroke="#a855f7" stroke-width="1" opacity="0.9"/>
  <text x="310" y="198" text-anchor="middle" class="box-label">Query Analysis</text>
  <text x="310" y="214" text-anchor="middle" class="box-detail">TF-IDF · vagueness scoring</text>
  <text x="310" y="228" text-anchor="middle" class="box-detail">key term extraction</text>
  <text x="310" y="243" text-anchor="middle" class="box-metric">16D feature vector</text>

  <!-- Persona Manifold -->
  <rect x="220" y="264" width="180" height="72" rx="6" fill="url(#box-score)" stroke="#a855f7" stroke-width="1" opacity="0.9"/>
  <text x="310" y="284" text-anchor="middle" class="box-label">Query Persona (PSM)</text>
  <text x="310" y="300" text-anchor="middle" class="box-detail">RBF kernel · RKHS embedding</text>
  <text x="310" y="314" text-anchor="middle" class="box-detail">Pitman-Yor archetype birth</text>
  <text x="310" y="329" text-anchor="middle" class="box-metric">per-archetype weights</text>

  <!-- Arrow from dep graph to query -->
  <line x1="180" y1="303" x2="218" y2="298" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- ════════ STAGE 3: SELECT ════════ -->
  <text x="530" y="82" text-anchor="middle" class="stage-label">③ Select</text>

  <!-- SAST Security -->
  <rect x="440" y="92" width="180" height="60" rx="6" fill="url(#box-select)" stroke="#22c55e" stroke-width="1" opacity="0.9"/>
  <text x="530" y="112" text-anchor="middle" class="box-label">SAST Security Scan</text>
  <text x="530" y="128" text-anchor="middle" class="box-detail">55 rules · 8 CWE · taint flow</text>
  <text x="530" y="145" text-anchor="middle" class="box-metric">flag before AI sees it</text>

  <!-- Arrow -->
  <line x1="400" y1="127" x2="438" y2="117" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- KKT Knapsack -->
  <rect x="440" y="166" width="180" height="78" rx="6" fill="url(#box-select)" stroke="#22c55e" stroke-width="1" opacity="0.9"/>
  <text x="530" y="186" text-anchor="middle" class="box-label">KKT Knapsack</text>
  <text x="530" y="202" text-anchor="middle" class="box-detail">soft bisection: O(30N)</text>
  <text x="530" y="216" text-anchor="middle" class="box-detail">or exact 0/1 DP: O(N×1000)</text>
  <text x="530" y="230" text-anchor="middle" class="box-detail">budget-exact selection</text>
  <text x="530" y="243" text-anchor="middle" class="box-metric">Σ σ((sᵢ-λ*cᵢ)/τ)·cᵢ = B</text>

  <!-- Arrow -->
  <line x1="400" y1="214" x2="438" y2="205" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- IOS Diversity -->
  <rect x="440" y="258" width="180" height="78" rx="6" fill="url(#box-select)" stroke="#22c55e" stroke-width="1" opacity="0.9"/>
  <text x="530" y="278" text-anchor="middle" class="box-label">IOS + Diversity</text>
  <text x="530" y="294" text-anchor="middle" class="box-detail">submodular diversity penalty</text>
  <text x="530" y="308" text-anchor="middle" class="box-detail">multi-resolution: full/skel/ref</text>
  <text x="530" y="322" text-anchor="middle" class="box-detail">(1-1/e) ≈ 63% optimal</text>
  <text x="530" y="335" text-anchor="middle" class="box-metric">auth + DB + API not 3× auth</text>

  <!-- Arrow -->
  <line x1="400" y1="300" x2="438" y2="297" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- ════════ STAGE 4: OUTPUT ════════ -->
  <text x="750" y="82" text-anchor="middle" class="stage-label">④ Deliver</text>

  <!-- Hierarchical Compression -->
  <rect x="660" y="92" width="220" height="118" rx="6" fill="url(#box-output)" stroke="#14b8a6" stroke-width="1" opacity="0.9"/>
  <text x="770" y="112" text-anchor="middle" class="box-label">3-Level Context Pyramid</text>

  <!-- L1 -->
  <rect x="720" y="120" width="100" height="18" rx="3" fill="#0f766e" stroke="#5eead4" stroke-width="0.5"/>
  <text x="770" y="133" text-anchor="middle" class="box-detail" fill="#5eead4">L1: All files (5%)</text>

  <!-- L2 -->
  <rect x="700" y="142" width="140" height="18" rx="3" fill="#0f766e" stroke="#5eead4" stroke-width="0.5"/>
  <text x="770" y="155" text-anchor="middle" class="box-detail" fill="#5eead4">L2: Dep cluster (25%)</text>

  <!-- L3 -->
  <rect x="676" y="164" width="188" height="18" rx="3" fill="#0f766e" stroke="#5eead4" stroke-width="0.5"/>
  <text x="770" y="177" text-anchor="middle" class="box-detail" fill="#5eead4">L3: Full fragments (70%)</text>

  <text x="770" y="203" text-anchor="middle" class="box-metric">100% codebase visibility</text>

  <!-- Arrow -->
  <line x1="620" y1="160" x2="658" y2="155" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- To LLM -->
  <rect x="660" y="226" width="220" height="65" rx="6" fill="url(#box-output)" stroke="#14b8a6" stroke-width="1.5" opacity="0.9" filter="url(#boxGlow)"/>
  <text x="770" y="250" text-anchor="middle" class="box-label" font-size="13">→ Your AI Tool</text>
  <text x="770" y="268" text-anchor="middle" class="box-metric" font-size="11">9,300 - 55K tokens (was 186,420)</text>
  <text x="770" y="284" text-anchor="middle" class="box-metric" font-size="12"><tspan style="opacity:0.4;font-weight:400">70-</tspan>95% saved · 8.2ms</text>

  <!-- Arrow from pyramid to LLM -->
  <line x1="770" y1="210" x2="770" y2="224" stroke="#34d399" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <!-- Arrow from IOS to LLM -->
  <line x1="620" y1="297" x2="658" y2="260" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- ════════ STAGE 5: LEARN (feedback loop) ════════ -->
  <text x="530" y="370" text-anchor="middle" class="stage-label">⑤ Learn</text>

  <!-- PRISM RL -->
  <rect x="350" y="380" width="170" height="72" rx="6" fill="url(#box-learn)" stroke="#f59e0b" stroke-width="1" opacity="0.9"/>
  <text x="435" y="400" text-anchor="middle" class="box-label">PRISM Optimizer</text>
  <text x="435" y="416" text-anchor="middle" class="box-detail">spectral natural gradient</text>
  <text x="435" y="430" text-anchor="middle" class="box-detail">4×4 eigendecomposition</text>
  <text x="435" y="445" text-anchor="middle" class="box-metric">w += α Q Λ⁻¹ᐟ² Qᵀ g</text>

  <!-- EGTC Temperature -->
  <rect x="540" y="380" width="170" height="72" rx="6" fill="url(#box-learn)" stroke="#f59e0b" stroke-width="1" opacity="0.9"/>
  <text x="625" y="400" text-anchor="middle" class="box-label">EGTC Temperature</text>
  <text x="625" y="416" text-anchor="middle" class="box-detail">Fisher-calibrated · self-tuning</text>
  <text x="625" y="430" text-anchor="middle" class="box-detail">no manual temperature setting</text>
  <text x="625" y="445" text-anchor="middle" class="box-metric">τ adapts per query type</text>

  <!-- Utilization Feedback -->
  <rect x="730" y="380" width="150" height="72" rx="6" fill="url(#box-learn)" stroke="#f59e0b" stroke-width="1" opacity="0.9"/>
  <text x="805" y="400" text-anchor="middle" class="box-label">Utilization Score</text>
  <text x="805" y="416" text-anchor="middle" class="box-detail">trigram + identifier</text>
  <text x="805" y="430" text-anchor="middle" class="box-detail">overlap with LLM response</text>
  <text x="805" y="445" text-anchor="middle" class="box-metric">closed-loop feedback</text>

  <!-- Feedback arrow: LLM → Utilization -->
  <path d="M 820 291 Q 850 340 820 378" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowhead)"/>
  <text x="848" y="340" class="arrow-label" fill="#f59e0b">response</text>

  <!-- Feedback arrow: Utilization → PRISM -->
  <line x1="730" y1="416" x2="712" y2="416" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowhead)"/>

  <!-- Feedback arrow: PRISM → Score (loop back) -->
  <path d="M 350 416 Q 200 416 200 340 Q 200 300 218 290" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowhead)"/>
  <text x="195" y="370" class="arrow-label" fill="#f59e0b" transform="rotate(-90 195 370)">weights update</text>

  <!-- ════════ BOTTOM STATS BAR ════════ -->
  <rect x="20" y="470" width="860" height="40" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>

  <!-- Stats -->
  <text x="80" y="495" text-anchor="middle" class="box-label" fill="#3b82f6" font-size="11">19 Modules</text>
  <text x="200" y="495" text-anchor="middle" class="box-label" fill="#a855f7" font-size="11">126 Tests</text>
  <text x="320" y="495" text-anchor="middle" class="box-label" fill="#22c55e" font-size="11">55 SAST Rules</text>
  <text x="450" y="495" text-anchor="middle" class="box-label" fill="#14b8a6" font-size="11">&lt;10ms Latency</text>
  <text x="580" y="495" text-anchor="middle" class="box-label" fill="#f59e0b" font-size="11">Self-Learning</text>
  <text x="720" y="495" text-anchor="middle" class="box-label" fill="#ef4444" font-size="11">Zero Config</text>
  <text x="840" y="495" text-anchor="middle" class="box-label" fill="#8b5cf6" font-size="11">Rust + PyO3</text>
</svg>

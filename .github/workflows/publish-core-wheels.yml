name: Publish entroly-core wheels to PyPI

# Builds native Python wheels and publishes to PyPI on release tags.
# All platforms are required: Linux (x86_64 + aarch64), macOS (arm64 + x86_64), Windows (x86_64).

on:
  push:
    tags:
      - 'entroly-v*'
  workflow_dispatch:

jobs:
  linux-x86_64:
    name: Linux (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist --manifest-path entroly-core/Cargo.toml
          manylinux: auto
          target: x86_64
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-x86_64
          path: dist

  linux-aarch64:
    name: Linux (aarch64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist --manifest-path entroly-core/Cargo.toml
          manylinux: auto
          target: aarch64-unknown-linux-gnu
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-aarch64
          path: dist

  macos-arm64:
    name: macOS (arm64 — Apple Silicon)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist --manifest-path entroly-core/Cargo.toml
          target: aarch64-apple-darwin
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-arm64
          path: dist

  macos-x86_64:
    name: macOS (x86_64 — Intel)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist --manifest-path entroly-core/Cargo.toml
          target: x86_64-apple-darwin
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-x86_64
          path: dist

  windows:
    name: Windows (x86_64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist --manifest-path entroly-core/Cargo.toml
          target: x86_64-pc-windows-msvc
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows
          path: dist

  publish:
    name: Publish to PyPI
    needs: [linux-x86_64, linux-aarch64, macos-arm64, macos-x86_64, windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/entroly-v')
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - run: ls -la dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true
          password: ${{ secrets.PYPI_TOKEN }}

name: Publish entroly-core wheels to PyPI

# Builds native Python wheels and publishes to PyPI on release tags.
# Covers the most common platforms: Linux x86_64, macOS, Windows x86_64.
# aarch64 omitted for now (requires QEMU cross-compilation complexity).

on:
  push:
    tags:
      - 'entroly-v*'
  workflow_dispatch:

jobs:
  build-linux:
    name: Build wheels (Linux x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: x86_64
          args: --release --out dist --manifest-path entroly-core/Cargo.toml
          manylinux: auto
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-x86_64
          path: dist

  build-macos:
    name: Build wheels (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build wheels (x86_64)
        uses: PyO3/maturin-action@v1
        with:
          target: x86_64
          args: --release --out dist --manifest-path entroly-core/Cargo.toml
      - name: Build wheels (arm64)
        uses: PyO3/maturin-action@v1
        with:
          target: aarch64
          args: --release --out dist --manifest-path entroly-core/Cargo.toml
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos
          path: dist

  build-windows:
    name: Build wheels (Windows x86_64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: x86_64
          args: --release --out dist --manifest-path entroly-core/Cargo.toml
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-x86_64
          path: dist

  publish-to-pypi:
    name: Publish entroly-core to PyPI
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/entroly-v')
    permissions:
      id-token: write

    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - name: List wheels
        run: ls -la dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true

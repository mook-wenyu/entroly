name: Publish entroly-core wheels to PyPI

on:
  push:
    tags:
      - 'entroly-v*'
  workflow_dispatch:

env:
  PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"

jobs:
  linux-x86_64:
    name: Linux (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist --manifest-path entroly-core/Cargo.toml -i python3.12
          manylinux: auto
          target: x86_64
          docker-options: -e CI -e PYO3_USE_ABI3_FORWARD_COMPATIBILITY=1
      - uses: actions/upload-artifact@v7
        with:
          name: wheels-linux-x86_64
          path: dist

  linux-aarch64:
    name: Linux (aarch64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist --manifest-path entroly-core/Cargo.toml -i python3.12
          manylinux: manylinux_2_28
          target: aarch64-unknown-linux-gnu
          docker-options: -e CI -e PYO3_USE_ABI3_FORWARD_COMPATIBILITY=1
      - uses: actions/upload-artifact@v7
        with:
          name: wheels-linux-aarch64
          path: dist

  macos-universal:
    name: macOS (universal2)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist --manifest-path entroly-core/Cargo.toml
          target: universal2-apple-darwin
      - uses: actions/upload-artifact@v7
        with:
          name: wheels-macos-universal
          path: dist

  windows:
    name: Windows (x86_64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist --manifest-path entroly-core/Cargo.toml
          target: x86_64-pc-windows-msvc
      - uses: actions/upload-artifact@v7
        with:
          name: wheels-windows
          path: dist

  publish:
    name: Publish to PyPI
    needs: [linux-x86_64, linux-aarch64, macos-universal, windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/entroly-v') || github.event_name == 'workflow_dispatch'
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - run: ls -la dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true
          # Authenticated via PyPI Trusted Publishers (OIDC) — no token needed.
          # Configure at:
          # https://pypi.org/manage/project/entroly-core/settings/publishing/

name: Publish entroly-core wheels to PyPI

on:
  push:
    tags:
      - 'entroly-v*'
  workflow_dispatch:

jobs:
  # ── ABI3 wheels ──────────────────────────────────────────────────────
  #
  # Each platform produces exactly ONE wheel (abi3-py310 in entroly-core's
  # Cargo.toml). That single wheel works for Python 3.10, 3.11, 3.12, 3.13,
  # 3.14, and every future Python 3.x release on that platform — no per-
  # version interpreter flags, no PYO3_USE_ABI3_FORWARD_COMPATIBILITY env.
  # PyO3 0.25+ supports Python 3.14 natively.
  #
  # This permanently retires the gh#41-class failure mode: pip on a new
  # Python version always finds a wheel; it never falls back to a sdist
  # build that depends on a specific PyO3 release.

  linux-x86_64:
    name: Linux (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist --manifest-path entroly-core/Cargo.toml
          manylinux: auto
          target: x86_64
      - uses: actions/upload-artifact@v7
        with:
          name: wheels-linux-x86_64
          path: dist

  linux-aarch64:
    name: Linux (aarch64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist --manifest-path entroly-core/Cargo.toml
          manylinux: manylinux_2_28
          target: aarch64-unknown-linux-gnu
      - uses: actions/upload-artifact@v7
        with:
          name: wheels-linux-aarch64
          path: dist

  macos-universal:
    name: macOS (universal2)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist --manifest-path entroly-core/Cargo.toml
          target: universal2-apple-darwin
      - uses: actions/upload-artifact@v7
        with:
          name: wheels-macos-universal
          path: dist

  windows:
    name: Windows (x86_64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist --manifest-path entroly-core/Cargo.toml
          target: x86_64-pc-windows-msvc
      - uses: actions/upload-artifact@v7
        with:
          name: wheels-windows
          path: dist

  publish:
    name: Publish to PyPI
    needs: [linux-x86_64, linux-aarch64, macos-universal, windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/entroly-v') || github.event_name == 'workflow_dispatch'
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist
      - run: ls -la dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true
          password: ${{ secrets.CORE_PYPI_TOKEN }}
